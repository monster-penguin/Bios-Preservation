# ==============================================================================
#  bios_preservation.conf
#  Location: bios_preservation/configure/bios_preservation.conf
#
#  All relative paths are resolved from the bios_preservation/ root folder
#  (the directory that contains bios_preservation.py).
# ==============================================================================


# ------------------------------------------------------------------------------
# [update]  Script 1 — parse platform YAMLs, produce combined manifests
# ------------------------------------------------------------------------------
[update]

# Source for platform YAMLs:
#   url   — download from GitHub (and cache locally in yaml_cache_dir)
#   local — load from yaml_local_dir only
yaml_source    = url

# Base URL when yaml_source = url
yaml_url_base  = https://raw.githubusercontent.com/Abdess/retrobios/main/platforms/

# Directory for locally stored YAML files (used when yaml_source = local,
# and also as the download cache when yaml_source = url)
yaml_local_dir = yaml_cache
yaml_cache_dir = yaml_cache

# When yaml_source = url:
#   false (default) — use the cached copy if it exists, avoiding a download
#   true            — always re-download from the URL
yaml_refresh   = false

# Directory where combined_platform_manifest.json and .csv are written
output_dir     = update


# ------------------------------------------------------------------------------
# [build]  Script 2 — scan sources, verify BIOS files, build sqlar database
# ------------------------------------------------------------------------------
[build]

# Research manifest to read from (produced by Script 1 — never overwritten)
manifest_input = update/combined_platform_manifest.json

# Build output files (separate from update outputs)
sqlar_output   = build/bios_database.sqlar
json_output    = build/combined_platform_build.json
csv_output     = build/combined_platform_build.csv

# true  = add to existing database (preserves previously found files)
# false = delete and rebuild from scratch
incremental    = true

# Source locations — add as many source_N entries as needed.
# Each may be a local file, a local directory, or an HTTP/HTTPS URL.
# Local directories are scanned recursively up to 6 levels deep.
# Archives (zip, 7z, rar, tar, tar.gz, tar.bz2, tar.xz) are opened and
# scanned recursively up to 6 total nesting levels.
#
# Prefix a directory path with "hashscan:" to match files purely by MD5 hash,
# ignoring filenames entirely — useful for bulk collections of renamed files.
#
# source_1 = C:/Users/you/bios_collection
# source_2 = C:/Users/you/Downloads/bios_pack.zip
# source_3 = https://example.com/bios_archive.zip
# source_4 = hashscan:C:/Users/you/unsorted_dumps


# ------------------------------------------------------------------------------
# [stage]  Script 3 — stage BIOS files for selected platforms
# ------------------------------------------------------------------------------
[stage]

# Build database and manifest to read from (produced by Script 2)
sqlar_input    = build/bios_database.sqlar
manifest_input = build/combined_platform_build.json

# Root directory for staged output
stage_dir      = stage

# Output format:
#   directory — one subfolder per platform: stage/<platform>/
#   zip       — one zip per platform:       stage/<platform>_bios.zip
output_format  = directory

# Platform selection is now done interactively at the start of each Stage run.
# The defaults below are used as the starting state for the interactive prompt.
# Change any to "no" to default that platform off.
retrodeck  = no
retropie   = no
batocera   = no
emudeck    = no
recalbox   = no
retrobat   = no
lakka      = no
retroarch  = no
romm       = no
bizhawk    = no


# ------------------------------------------------------------------------------
# [report]  Script 4 — generate per-platform BIOS status reports
# ------------------------------------------------------------------------------
[report]

# Build database and manifest to read from (produced by Script 2)
sqlar_input    = build/bios_database.sqlar
manifest_input = build/combined_platform_build.json

# Directory where per-platform report CSVs are written
report_dir     = report

# Platform selection is now done interactively at the start of each Report run.
# The defaults below are used as the starting state for the interactive prompt.
# Change any to "no" to default that platform off.
retrodeck  = yes
retropie   = yes
batocera   = yes
emudeck    = yes
recalbox   = yes
retrobat   = yes
lakka      = yes
retroarch  = yes
romm       = yes
bizhawk    = yes

# ------------------------------------------------------------------------------
# [backup]  Script 5 — export all blobs to a dated zip (full portable backup)
# ------------------------------------------------------------------------------
[backup]

# Directory where dated backup .zip files are written
backup_dir     = backup

# ------------------------------------------------------------------------------
# [restore]  Script 6 — restore database from a backup zip
# ------------------------------------------------------------------------------
[restore]

# Directory where blobs whose canonical is no longer in the current manifest
# are written during restore.  Each orphan is named {md5}.{ext} to avoid
# collisions; _orphans.json maps each filename to its original canonical name.
# To recover orphans: run Update, then add this folder as a Build source.
orphans_dir    = orphans
